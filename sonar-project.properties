# SonarQube / SonarCloud — Temple Cat voice stack
#
# GitHub Actions (.github/workflows/sonar.yml):
#   Secret: SONAR_TOKEN
#   Repository variable: SONAR_ORGANIZATION (SonarCloud organization key), or
#   Secret: SONAR_HOST_URL (self-hosted SonarQube base URL, no trailing slash)
#
# Create a SonarCloud/SonarQube project whose key matches sonar.projectKey below.

sonar.projectKey=temple-cat
sonar.projectName=Temple Cat Voice

sonar.sources=backend,frontend
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/.venv/**,**/__pycache__/**,**/*.pyc,**/build/**

sonar.python.version=3.11
