x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    # Standalone image CMD — pinned here so we never fall through to `npm run start`
    # (which expects `.next` from `next build` in-image).
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - BOT_LOG_DIR=/app/logs
    volumes:
      - bot_logs:/app/logs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    logging: *default-logging

  # Pipecat OpenTelemetry: docker compose --profile otel up -d
  # Jaeger v2 (OTLP-native collector + query); replaces jaegertracing/all-in-one (v1).
  jaeger:
    profiles: ["otel"]
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
    restart: unless-stopped
    logging: *default-logging


volumes:
  bot_logs:
