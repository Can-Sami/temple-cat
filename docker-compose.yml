version: '3.8'

services:
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app:ro
    ports:
      - "3000:3000"
    environment:
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      - backend

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app:ro
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
