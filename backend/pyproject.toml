[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "goatcat-voice-backend"
version = "0.0.0"
description = "Voice AI backend"
readme = "README.md"
dependencies = [
  "fastapi>=0.95",
  "uvicorn[standard]>=0.22",
  "qdrant-client>=1.3"
]

[project.scripts]
start = "uvicorn:run"
